name: muscle_map
version: 1.0.0
description: >
  A Flutter SDK for rendering interactive human body muscle maps 
  with highlights, heatmaps, gestures, and animations.
  Supports male & female body models with front & back views.

homepage: https://github.com/Fi2zz/flutter_muscle_map
repository: https://github.com/Fi2zz/flutter_muscle_map

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
